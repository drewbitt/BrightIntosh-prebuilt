name: Build BrightIntosh

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream ref (branch / tag / sha) to build'
        required: false
        default: main
        type: string
      force:
        description: 'Build even if upstream SHA matches the last release'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 9 * * *'   # daily at 09:17 UTC

permissions:
  contents: write   # for publishing to GitHub Releases

concurrency:
  group: build-${{ github.event.inputs.ref || 'main' }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      upstream_short: ${{ steps.upstream.outputs.short }}
    steps:
      - name: Resolve upstream ref
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF='${{ github.event.inputs.ref || ''main'' }}'
          SHA=$(gh api "repos/niklasr22/BrightIntosh/commits/${REF}" --jq .sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Upstream ${REF} -> ${SHA}"

      - name: Compare with last release
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          UPSTREAM_SHA: ${{ steps.upstream.outputs.sha }}
        run: |
          if [ '${{ github.event.inputs.force }}' = 'true' ]; then
            echo "force=true requested — building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY=$(gh release view latest --json body --jq .body 2>/dev/null || true)
          if printf '%s' "$BODY" | grep -qF "upstream-sha: ${UPSTREAM_SHA}"; then
            echo "Upstream unchanged (${UPSTREAM_SHA}) — skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Upstream changed or no SHA marker on existing release — building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          repository: niklasr22/BrightIntosh
          ref: ${{ needs.check.outputs.upstream_sha }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (non-Store scheme = unrestricted)
        run: |
          xcodebuild \
            -project BrightIntosh.xcodeproj \
            -scheme BrightIntosh \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc sign
        id: sign
        run: |
          APP=$(find build/Build/Products -type d -name BrightIntosh.app | head -n1)
          # Sign nested bundles before the outer app.
          find "$APP/Contents" \( -name '*.appex' -o -name '*.framework' \) -prune -print \
            | while read -r b; do codesign --force --sign - "$b"; done
          codesign --force --sign - "$APP"
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: BrightIntosh
          path: ${{ steps.sign.outputs.app }}
          if-no-files-found: error

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          UPSTREAM_SHA: ${{ needs.check.outputs.upstream_sha }}
          UPSTREAM_SHORT: ${{ needs.check.outputs.upstream_short }}
        run: |
          ditto -c -k --keepParent "${{ steps.sign.outputs.app }}" BrightIntosh.zip
          DATE=$(date -u +%Y-%m-%d)
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest BrightIntosh.zip \
            --title "Latest build — ${DATE} (upstream ${UPSTREAM_SHORT})" \
            --notes "Auto-built from [niklasr22/BrightIntosh@${UPSTREAM_SHORT}](https://github.com/niklasr22/BrightIntosh/commit/${UPSTREAM_SHA}). Non-Store scheme, ad-hoc signed.

          **Install:** unzip, then \`xattr -cr /Applications/BrightIntosh.app\` to clear quarantine.

          <!-- upstream-sha: ${UPSTREAM_SHA} -->"
