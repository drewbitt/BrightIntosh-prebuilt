name: Build BrightIntosh

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Upstream ref (branch / tag / sha) to build'
        required: false
        default: main
        type: string
      force:
        description: 'Build even if upstream SHA matches the last release'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '17 9 * * *'   # daily at 09:17 UTC

permissions:
  contents: write   # for publishing to GitHub Releases

concurrency:
  group: build-${{ github.event.inputs.ref || 'main' }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.r.outputs.sha }}
      short: ${{ steps.r.outputs.short }}
      build: ${{ steps.r.outputs.build }}
    steps:
      - id: r
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REF: ${{ github.event.inputs.ref || 'main' }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail
          SHA=$(gh api "repos/niklasr22/BrightIntosh/commits/${REF}" --jq .sha)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Upstream ${REF} -> ${SHA}"

          if [ "${FORCE}" = "true" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "force=true requested — building."
            exit 0
          fi
          BODY=$(gh release view latest --json body --jq .body 2>/dev/null || true)
          if printf '%s' "$BODY" | grep -qF "upstream-sha: ${SHA}"; then
            echo "build=false" >> "$GITHUB_OUTPUT"
            echo "Upstream unchanged — skipping build."
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changed or no SHA marker — building."
          fi

  build:
    needs: check
    if: needs.check.outputs.build == 'true'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          repository: niklasr22/BrightIntosh
          ref: ${{ needs.check.outputs.sha }}

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build (non-Store scheme = unrestricted)
        run: |
          xcodebuild \
            -project BrightIntosh.xcodeproj \
            -scheme BrightIntosh \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc sign and zip
        id: sign
        run: |
          set -euo pipefail
          APP=$(find build/Build/Products -type d -name BrightIntosh.app | head -n1)
          # Sign nested bundles before the outer app.
          find "$APP/Contents" \( -name '*.appex' -o -name '*.framework' \) -prune -print \
            | while read -r b; do codesign --force --sign - "$b"; done
          codesign --force --sign - "$APP"
          ditto -c -k --keepParent "$APP" BrightIntosh.zip
          echo "app=$APP" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: BrightIntosh
          path: ${{ steps.sign.outputs.app }}
          if-no-files-found: error

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          SHA: ${{ needs.check.outputs.sha }}
          SHORT: ${{ needs.check.outputs.short }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Latest build — ${DATE} (upstream ${SHORT})"
          NOTES=$(cat <<EOF
          Auto-built from [niklasr22/BrightIntosh@${SHORT}](https://github.com/niklasr22/BrightIntosh/commit/${SHA}). Non-Store scheme, ad-hoc signed.

          **Install:** unzip, then \`xattr -cr /Applications/BrightIntosh.app\` to clear quarantine.

          <!-- upstream-sha: ${SHA} -->
          EOF
          )
          # Upsert: edit + clobber asset if release exists, otherwise create.
          # Avoids tearing down and recreating the `latest` tag on every build.
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest BrightIntosh.zip --clobber
            gh release edit latest --title "$TITLE" --notes "$NOTES"
          else
            gh release create latest BrightIntosh.zip --title "$TITLE" --notes "$NOTES"
          fi
